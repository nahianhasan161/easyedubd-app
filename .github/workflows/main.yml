name: Production Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"

      - run: flutter pub get
      - name: Set Version Code
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=${VERSION%%+*}
          VERSION_CODE=${{ github.run_number }}

          sed -i "s/^version:.*/version: ${VERSION_NAME}+${VERSION_CODE}/" pubspec.yaml

          echo "New version: ${VERSION_NAME}+${VERSION_CODE}"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - run: cp build/app/outputs/flutter-apk/app-release.apk EasyEducationBD.apk

      - name: Publish Stable APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          name: Latest Stable
          make_latest: true
          files: EasyEducationBD.apk

      - name: Create Google Play credentials
        run: |
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > play-account.json

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-account.json
          packageName: com.easyeducationbd.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
