name: Dev Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Android Job (Ubuntu)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
      - run: flutter pub get
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk EasyEducationBD-dev.apk
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: EasyEducationBD-dev.apk

  # Windows Job
  build-windows:
    runs-on: windows-latest
    env:
      CXXFLAGS: "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
      - run: flutter pub get
      - run: flutter build windows --release
      
      # Diagnostic: List files to find the correct path and name
      - name: Find EXE
        shell: powershell
        run: Get-ChildItem -Path "build\windows" -Filter *.exe -Recurse
      
      # Rename the generated EXE
      # If the diagnostic step shows a different name, change 'EasyEducationBD.exe' below
      - name: Rename EXE
        shell: powershell
        run: |
          $file = Get-ChildItem -Path "build\windows" -Filter *.exe -Recurse | Select-Object -First 1
          Rename-Item -Path $file.FullName -NewName "EasyEducationBD-dev.exe"
          Move-Item -Path "EasyEducationBD-dev.exe" -Destination "build\windows\x64\runner\Release\"
        
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build\windows\x64\runner\Release\EasyEducationBD-dev.exe

  # Combine, Tag, and Release
  publish:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      
      - name: Publish Dev Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: Dev Build (${{ github.sha }})
          prerelease: true
          make_latest: false
          files: |
            android-apk/EasyEducationBD-dev.apk
            windows-exe/EasyEducationBD-dev.exe