name: Dev Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Android Job (Ubuntu)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
      - run: flutter pub get
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk EasyEducationBD-dev.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: EasyEducationBD-dev.apk

  # Windows Job
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
      - run: flutter pub get

      - name: Build Windows Release
        shell: pwsh
        run: flutter build windows --release
        env:
          CMAKE_BUILD_TYPE: Release

      - name: Verify Release Build
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "build\windows\x64\runner\Release" -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No Release EXE found!" }

          # Find dumpbin dynamically
          $dumpbin = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC" -Recurse -Filter "dumpbin.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $dumpbin) {
            $dumpbin = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC" -Recurse -Filter "dumpbin.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          if ($dumpbin) {
            $deps = & $dumpbin.FullName /dependents $exe.FullName
            if ($deps -match "VCRUNTIME140D|MSVCP140D|ucrtbased") {
              throw "DEBUG runtime dependencies found!"
            }
            Write-Host "✓ Release build verified: $($exe.FullName)"
          } else {
            Write-Host "⚠ dumpbin not found, skipping dependency check"
            Write-Host "✓ Release EXE found: $($exe.FullName)"
          }

      - name: Rename EXE
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release\easyedubd_app.exe"
          $dest = "build\windows\x64\runner\Release\EasyEducationBD-dev.exe"
          Move-Item -Path $src -Destination $dest -Force

      - name: Zip Release folder
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "EasyEducationBD-dev-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: EasyEducationBD-dev-windows.zip

  # Combine, Tag, and Release
  publish:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Publish Dev Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: Dev Build (${{ github.sha }})
          prerelease: true
          make_latest: false
          files: |
            android-apk/EasyEducationBD-dev.apk
            windows-exe/EasyEducationBD-dev-windows.zip
